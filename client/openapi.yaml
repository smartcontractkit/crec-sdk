openapi: 3.0.4
info:
  title: Chainlink Verifiable Network API
  version: 0.1.0

paths:
  /health-check:
    get:
      summary: Health check endpoint
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheck"
  /listeners:
    post:
      summary: Creates a new listener.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateListener"
      responses:
        "201":
          description: Listener created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listener"
    get:
      summary: Retrieves event listeners.
      parameters:
        - in: query
          name: created.lt
          description: Filter events created before this timestamp
          schema:
            type: integer
            format: int64
        - in: query
          name: created.lte
          description: Filter events created at or before this timestamp
          schema:
            type: integer
            format: int64
        - in: query
          name: created.gt
          description: Filter events created after this timestamp
          schema:
            type: integer
            format: int64
        - in: query
          name: created.gte
          description: Filter events created at or after this timestamp
          schema:
            type: integer
            format: int64
        - in: query
          name: limit
          description: The number of events to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: starting_after
          description: Return events starting after this event UUID
          schema:
            type: string
            format: uuid
        - in: query
          name: ending_before
          description: Return events occurring before this event UUID
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListenerList"

  /events:
    post:
      summary: Creates a new event.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEvent"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    get:
      summary: Retrieves events.
      parameters:
        - in: query
          name: created.lt
          description: Filter events created before this timestamp
          schema:
            type: integer
            format: int64
        - in: query
          name: created.lte
          description: Filter events created at or before this timestamp
          schema:
            type: integer
            format: int64
        - in: query
          name: created.gt
          description: Filter events created after this timestamp
          schema:
            type: integer
            format: int64
        - in: query
          name: created.gte
          description: Filter events created at or after this timestamp
          schema:
            type: integer
            format: int64
        - in: query
          name: limit
          description: The number of events to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: starting_after
          description: Return events starting after this event UUID
          schema:
            type: string
            format: uuid
        - in: query
          name: ending_before
          description: Return events occurring before this event UUID
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventList"
  /operations:
    post:
      summary: Sends an onchain transaction.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOperation"
      responses:
        "201":
          description: Operation created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
    get:
      summary: Retrieves operations.
      parameters:
        - in: query
          name: created.lt
          description: Filter operations created before this timestamp
          schema:
            type: integer
            format: int64
        - in: query
          name: created.lte
          description: Filter operations created at or before this timestamp
          schema:
            type: integer
            format: int64
        - in: query
          name: created.gt
          description: Filter operations created after this timestamp
          schema:
            type: integer
            format: int64
        - in: query
          name: created.gte
          description: Filter operations created at or after this timestamp
          schema:
            type: integer
            format: int64
        - in: query
          name: limit
          description: The number of operations to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: starting_after
          description: Return operations starting after this operation UUID
          schema:
            type: string
            format: uuid
        - in: query
          name: ending_before
          description: Return operations occurring before this operation UUID
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Successful operation status retrieval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationList"
  /operations/{operation_id}:
    get:
      summary: Retrieves the status of an operation.
      parameters:
        - in: path
          name: operation_id
          required: true
          description: Unique identifier for the operation
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
  /operation_status:
    post:
      summary: Updates the status of an operation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOperationStatus"
      responses:
        "202":
          description: Operation status recorded successfully

components:
  schemas:
    HealthCheck:
      type: object
      properties:
        status:
          type: string
          example: "ok"
      required:
        - status
    CreateListener:
      type: object
      properties:
        service:
          type: string
          description: Service namespace for the listener
        name:
          type: string
          description: Name of the event to listen for
        address:
          type: string
          description: Smart contract address to listen for events
        options:
          type: object
          additionalProperties:
            type: string
      required:
        - service
        - name
        - address
    Listener:
      type: object
      properties:
        listener_id:
          type: string
          format: uuid
          description: Unique identifier for the listener
        created_at:
          type: integer
          format: int64
          description: Timestamp of when the listener was created
        status:
          type: string
          description: Current status of the listener
        service:
          type: string
          description: Service namespace for the listener
        name:
          type: string
          description: Name of the event to listen for
        address:
          type: string
          description: Smart contract address to listen for events
        options:
          type: object
          additionalProperties:
            type: string
      required:
        - listener_id
        - created_at
        - status
        - service
        - name
        - address
        - options
    ListenerList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Listener"
        has_more:
          type: boolean
          description: True if there are more listeners to fetch
      required:
        - data
        - has_more
    CreateEvent:
      type: object
      properties:
        service:
          type: string
          description: Service namespace for the event
        name:
          type: string
          description: Name of the event
        ocr_report:
          type: string
          description:  OCR report for the event
        ocr_context:
          type: string
          description: OCR context for the event
        verifiable_event:
          type: string
          description: Base64 encoded verifiable event
        signatures:
          type: array
          items:
            type: string
            description: Signature of the event
        address:
          type: string
          description: Smart contract address from which the event was emitted
      required:
        - service
        - name
        - ocr_report
        - ocr_context
        - verifiable_event
        - signatures
        - address
    Event:
      type: object
      properties:
        event_id:
          type: string
          format: uuid
          description: Unique identifier for the event
        created_at:
          type: integer
          format: int64
          description: Timestamp of when the event was created
        service:
          type: string
          description: Service namespace for the event
        name:
          type: string
          description: Name of the event
        ocr_report:
          type: string
          description: OCR report for the event
        ocr_context:
          type: string
          description: OCR context for the event
        verifiable_event:
          type: string
          description: Base64 encoded verifiable event
        signatures:
          type: array
          items:
            type: string
            description: Signature of the event
      required:
        - event_id
        - created_at
        - service
        - name
        - ocr_report
        - ocr_context
        - verifiable_event
        - signatures
        - address
    EventList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Event"
        has_more:
          type: boolean
          description: True if there are more events to fetch
      required:
        - data
        - has_more
    CreateOperation:
      type: object
      properties:
        account_operation_id:
          type: string
          description: Unique account operation identifier
        account:
          type: string
          description: Onchain account address performing the operation
        chain_id:
          type: integer
          description: The id that identifies the chain where the account performing the operation lives
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/TransactionRequest"
        signature:
          type: string
          description: EIP-712 signature of the operation
      required:
        - account_operation_id
        - account
        - chain_id
        - transactions
        - signature
    Operation:
      type: object
      properties:
        operation_id:
          type: string
          format: uuid
          description: Unique identifier for the operation
        account_id:
          type: string
          format: uuid
          description: Identifier of the account performing the operation
        created_at:
          type: integer
          format: int64
          description: Timestamp of when the operation was created
        confirmed_at:
          type: integer
          format: int64
          description: Timestamp of when the operation was confirmed
        account_operation_id:
          type: string
          description: Unique account operation identifier
        transaction_hash:
          type: string
          description: Onchain transaction hash which included the operation
        status:
          type: string
          description: Current status of the operation
        account:
          type: string
          description: Onchain account address performing the operation
        chain_id:
          type: integer
          description: The id that identifies the chain where the account performing the operation lives
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        signature:
          type: string
          description: EIP-712 signature of the operation
      required:
        - operation_id
        - account_id
        - created_at
        - account_operation_id
        - status
        - account
        - chain_id
        - transactions
        - signature
    OperationList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Operation"
        has_more:
          type: boolean
          description: True if there are more operations to fetch
      required:
        - data
        - has_more
    UpdateOperationStatus:
      type: object
      properties:
        account_operation_id:
          type: string
          description: Unique account operation identifier
        account:
          type: string
          description: Onchain account address performing the operation
        chain_id:
          type: integer
          description: The id that identifies the chain where the account performing the operation lives
        transaction_hash:
          type: string
          description: Onchain transaction hash which included the operation
        transaction_timestamp:
          type: integer
          description: Timestamp of onchain transaction which included the operation
      required:
        - account_operation_id
        - account
        - chain_id
        - transaction_hash
        - transaction_timestamp
    TransactionRequest:
      type: object
      properties:
        to:
          type: string
          description: Address receiving the transaction
        value:
          type: string
          description: Amount of native token value being sent in the transaction
        data:
          type: string
          description: Hex-encoded calldata for the transaction
      required:
        - to
        - value
        - data
    Transaction:
      type: object
      properties:
        to:
          type: string
          description: Address receiving the transaction
        value:
          type: string
          description: Amount of native token value being sent in the transaction
        data:
          type: string
          description: Hex-encoded calldata for the transaction
      required:
        - to
        - value
        - data
